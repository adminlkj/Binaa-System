# ============================================================
# Render Deployment Configuration — Binaa System (Web App)
# ============================================================
# This is a WEB APPLICATION ONLY (Next.js standalone server).
# No desktop/Electron/Tauri components.
#
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ---------- Web Service (Next.js App) ----------
  - type: web
    name: binaa-system
    runtime: node
    plan: starter
    region: singapore  # closest to Saudi Arabia

    # ---------- Build ----------
    # Migrations and seeds run at STARTUP (not build) because DATABASE_URL
    # is only available at runtime. See scripts/startup.sh.
    buildCommand: |
      # 1. Install dependencies
      bun install --frozen-lockfile

      # 2. Switch Prisma to PostgreSQL for production
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma

      # 3. Generate Prisma Client (needed for build — types)
      bunx prisma generate

      # 4. Build Next.js (standalone output)
      #    prebuild hook auto-skips DB verification (no DATABASE_URL at build time)
      bun run build

    # ---------- Start ----------
    # Runs migrations + seeds + server in sequence.
    # See scripts/startup.sh for details.
    startCommand: |
      bash scripts/startup.sh

    # ---------- Health Check ----------
    healthCheckPath: /api/health
    healthCheckTimeout: 60
    autoDeploy: true

    # ---------- Environment Variables ----------
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: binaa-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: binaa-system
          property: host
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false  # set manually in Render dashboard for security

  # ---------- PostgreSQL Database ----------
  - type: pserv
    name: binaa-db
    runtime: postgresql
    plan: starter
    region: singapore
    ipAllowList: []  # allow all (Render internal network)
    maxConnections: 20
