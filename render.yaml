# ============================================================
# Render Deployment Configuration — Binaa System
# ============================================================
# This file configures the deployment on Render.com
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ---------- Web Service (Next.js App) ----------
  - type: web
    name: binaa-system
    runtime: node
    plan: starter
    region: singapore  # closest to Saudi Arabia

    # ---------- Build ----------
    buildCommand: |
      # 1. Install dependencies
      bun install --frozen-lockfile

      # 2. Switch Prisma to PostgreSQL for production
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma

      # 3. Generate Prisma Client
      bunx prisma generate

      # 4. Push schema to database (creates tables if needed)
      #    Use migrations in production for safety:
      #    bunx prisma migrate deploy
      bunx prisma db push --accept-data-loss

      # 5. Build Next.js (standalone output)
      bun run build

    # ---------- Start ----------
    startCommand: |
      NODE_ENV=production bun .next/standalone/server.js

    # ---------- Health Check ----------
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    autoDeploy: true

    # ---------- Environment Variables ----------
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: binaa-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: binaa-system
          property: host

  # ---------- PostgreSQL Database ----------
  - type: pserv
    name: binaa-db
    runtime: postgresql
    plan: starter
    region: singapore
    ipAllowList: []  # allow all (Render internal network)
    maxConnections: 20
