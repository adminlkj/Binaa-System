# ============================================================
# Render Deployment Configuration — Binaa System (Web App)
# ============================================================
# This is a WEB APPLICATION ONLY (Next.js standalone server).
# No desktop/Electron/Tauri components.
#
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ---------- Web Service (Next.js App) ----------
  - type: web
    name: binaa-system
    runtime: node
    plan: starter
    region: singapore  # closest to Saudi Arabia

    # ---------- Build ----------
    # P7 FIX: استبدلنا `prisma db push --accept-data-loss` (الذي يمكن أن
    # يُسقط أعمدة بصمت في الإنتاج) بـ `prisma migrate deploy` الآمن.
    # الـ migrations تُنشأ محلياً عبر `prisma migrate dev` ثم تُودَع في
    # مجلد prisma/migrations وتُطبَّق في الإنتاج بهذا الأمر.
    buildCommand: |
      # 1. Install dependencies
      bun install --frozen-lockfile

      # 2. Switch Prisma to PostgreSQL for production
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma

      # 3. Generate Prisma Client
      bunx prisma generate

      # 4. Apply migrations (safe — never drops data)
      #    If no migrations exist yet, create a baseline first locally:
      #      bunx prisma migrate dev --name init
      #    Then commit prisma/migrations/ and deploy.
      bunx prisma migrate deploy

      # 5. Seed admin user + chart of accounts (idempotent)
      bun scripts/seed-admin.ts || true
      bun scripts/seed-coa.ts || true

      # 6. Build Next.js (standalone output)
      bun run build

    # ---------- Start ----------
    # Next.js standalone server — production mode
    startCommand: |
      NODE_ENV=production node .next/standalone/server.js

    # ---------- Health Check ----------
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    autoDeploy: true

    # ---------- Environment Variables ----------
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: binaa-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: binaa-system
          property: host
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false  # set manually in Render dashboard for security

  # ---------- PostgreSQL Database ----------
  - type: pserv
    name: binaa-db
    runtime: postgresql
    plan: starter
    region: singapore
    ipAllowList: []  # allow all (Render internal network)
    maxConnections: 20
